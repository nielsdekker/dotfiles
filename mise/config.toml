[tools]
node = "latest"
rust = "latest"
cargo = "latest"
go = "latest"
pnpm = "latest"
uv = "latest"

# Generic tools
"github:neovim/neovim" = "nightly"
"github:tree-sitter/tree-sitter" = "latest"
"github:casey/just" = "latest"
"http:pass-cli" = {
    version = "1.5.2",
    url = "https://proton.me/download/pass-cli/{{version}}/pass-cli-{{os()}}-x86_64"
}
"pipx:mistral-vibe" = "latest"

# LSP's
"aqua:lua-language-server" = "latest"
"aqua:terraform-ls" = "latest"
"cargo:just-lsp" = "latest"
"go:golang.org/x/tools/gopls" = "latest"
"npm:@typescript/native-preview" = "latest"
"npm:vscode-json-languageservice" = "latest"

"http:yaml-language-server" = {
    version = "1.21.0",
    url = "https://github.com/redhat-developer/yaml-language-server/archive/refs/tags/{{version}}.zip",
    postinstall = '''
        cd $MISE_TOOL_INSTALL_PATH;
        npm install;
        npm run build;
        cd -;
    '''
}

# Kotlin LSP special cause why add a `/bin` folder with executable. That would
# make things boring.
"http:kotlin-lsp" = {
    version = "261.13587.0",
    url = "https://download-cdn.jetbrains.com/kotlin-lsp/{{version}}/kotlin-lsp-{{version}}-{{os()}}-{{arch()}}.zip",
    postinstall = '''  
        mkdir $MISE_TOOL_INSTALL_PATH/bin;
        ln -s "$MISE_TOOL_INSTALL_PATH/kotlin-lsp.sh" "$MISE_TOOL_INSTALL_PATH/bin/kotlin-lsp";
        chmod +x "$MISE_TOOL_INSTALL_PATH/kotlin-lsp.sh";
    '''
}

# Formatters and linters
"npm:prettier" = "latest"
"cargo:stylua" = "latest"
"github:facebook/ktfmt" = {
    version = "latest",
    asset_pattern = "ktfmt-*-with-dependencies.jar",
    postinstall = '''  
        mkdir $MISE_TOOL_INSTALL_PATH/bin;
        echo "#!/bin/bash" > $MISE_TOOL_INSTALL_PATH/bin/ktfmt
        echo "java -jar $MISE_TOOL_INSTALL_PATH/ktfmt-${MISE_TOOL_VERSION}-with-dependencies.jar \$@" >> $MISE_TOOL_INSTALL_PATH/bin/ktfmt
        chmod +x "$MISE_TOOL_INSTALL_PATH/bin/ktfmt"
    '''
}
"github:detekt/detekt" = {
    version = "latest",
    asset_pattern = "detekt-cli-*-all.jar",
    postinstall = '''
        mkdir $MISE_TOOL_INSTALL_PATH/bin
        echo "#!/bin/bash" > $MISE_TOOL_INSTALL_PATH/bin/detekt
        echo "java -jar $MISE_TOOL_INSTALL_PATH/detekt-cli-${MISE_TOOL_VERSION}-all.jar \$@" >> $MISE_TOOL_INSTALL_PATH/bin/detekt
        chmod +x "$MISE_TOOL_INSTALL_PATH/bin/detekt"
    '''
}

[tasks.vibe]
description = "Runs the mistral vibe CLI tool in a bubblewrap sandbox"
run = '''
bwrap \
    --unshare-all \
    --share-net \
    --die-with-parent \
    --new-session \
    --dev /dev \
    --proc /proc \
    --ro-bind /usr /usr \
    --ro-bind /etc /etc \
    --ro-bind /lib /lib \
    --ro-bind /lib64 /lib64 \
    --ro-bind /run /run \
    --bind /tmp /tmp \
    --ro-bind $HOME/.local/share/uv $HOME/.local/share/uv \
    --ro-bind $HOME/.local/share/mise/installs $HOME/.local/share/mise/installs \
    --bind $HOME/.vibe $HOME/.vibe \
    --bind $(pwd) $(pwd) \
    --clearenv \
    --setenv HOME $HOME \
    --setenv PATH $PATH \
    --setenv TERM $TERM \
    vibe
'''
