[org/gnome/shell/extensions/dynamic-music-pill]
action-left-click='toggle_menu'
action-right-click='play_pause'
enable-lyrics=false
enable-scroll-controls=false
enable-transparency=true
pill-dynamic-width=true
popup-follow-transparency=false
popup-hide-pill-visualizer=false
popup-show-visualizer=true
popup-vinyl-square=true
position-mode=1
show-album-art=false
target-container=3
transparency-strength=0
visualizer-bars=6
visualizer-style=3


[org/gnome/shell/extensions/tilingshell]
edge-tiling-mode='default'
enable-move-keybindings=true
enable-smart-window-border-radius=true
enable-tiling-system=false
layouts-json='[{"id":"2360543","tiles":[{"x":0,"y":0,"width":0.5,"height":1,"groups":[1]},{"x":0.5,"y":0,"width":0.5,"height":1,"groups":[1]}]}]'
quarter-tiling-threshold=16
selected-layouts=[['2360543'], ['2360543'], ['2360543'], ['2360543'], ['2360543'], ['2360543'], ['2360543'], ['2360543'], ['2360543'], ['2360543']]
show-indicator=false
snap-assistant-threshold=22
top-edge-maximize=false

[org/gnome/shell/extensions/chromaleon]
tint-shell=true
